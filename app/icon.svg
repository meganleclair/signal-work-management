<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark slate background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- 4 ascending signal bars — all bottom-aligned at y=27 -->
  <rect x="4"  y="20" width="5" height="7"  rx="1.5" fill="#818cf8"/>
  <rect x="11" y="16" width="5" height="11" rx="1.5" fill="#818cf8" opacity="0.85"/>
  <rect x="18" y="11" width="5" height="16" rx="1.5" fill="#818cf8" opacity="0.70"/>
  <rect x="25" y="6"  width="5" height="21" rx="1.5" fill="#818cf8" opacity="0.55"/>
  <!-- Small dot accent top-right of tallest bar -->
  <circle cx="27.5" cy="4.5" r="1.5" fill="#818cf8" opacity="0.9"/>
</svg>
