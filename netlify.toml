[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund --registry=https://registry.npmjs.org/"
  NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"
  # Set ANTHROPIC_API_KEY in Netlify → Site → Environment Variables for Triage Assist to work.

[[plugins]]
  package = "@netlify/plugin-nextjs"
